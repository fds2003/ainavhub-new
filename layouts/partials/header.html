<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon">AI</div>
            <span>AINavHub</span>
        </a>
        
        <div class="nav-links">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}" class="nav-link{{ if hasPrefix $.RelPermalink .URL }} active{{ end }}">{{ .Name }}</a>
            {{ end }}
        </div>
        
        <div class="nav-actions">
            <button class="btn btn-ghost nav-toggle" onclick="toggleMobileMenu()" title="菜单" aria-label="菜单">
                <span id="menu-icon">☰</span>
            </button>
            <button class="btn btn-ghost" onclick="toggleTheme()" title="切换主题">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </div>
</nav>

<style>
.nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--bg-primary); border-bottom: 1px solid var(--border-color);
    backdrop-filter: blur(12px);
}
.nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    height: 60px; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: var(--text-primary); text-decoration: none; }
.nav-brand-icon {
    width: 28px; height: 28px; background: var(--accent-primary);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 12px; font-weight: 700;
}
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link {
    padding: 8px 14px; color: var(--text-secondary); font-weight: 500;
    font-size: 14px; border-radius: 6px; text-decoration: none;
    transition: all 150ms ease;
}
.nav-link:hover, .nav-link.active { color: var(--text-primary); background: var(--bg-tertiary); }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-toggle { display: none; }
@media (max-width: 768px) {
    .nav-toggle { display: inline-flex; }
    .nav-links {
        display: none; position: fixed; top: 60px; left: 0; right: 0;
        flex-direction: column; gap: 0;
        background: var(--bg-primary); border-bottom: 1px solid var(--border-color);
        padding: 8px; box-shadow: var(--shadow-lg);
    }
    .nav-links.open { display: flex; }
    .nav-link { padding: 12px 16px; border-radius: var(--radius-md); font-size: 16px; }
}
</style>

<script>
function toggleTheme() {
    var html = document.documentElement;
    var icon = document.getElementById('theme-icon');
    var isDark = html.getAttribute('data-theme') !== 'light';
    if (isDark) {
        html.setAttribute('data-theme', 'light');
        icon.textContent = '☀️';
    } else {
        html.removeAttribute('data-theme');
        icon.textContent = '🌙';
    }
}
function toggleMobileMenu() {
    var links = document.querySelector('.nav-links');
    var icon = document.getElementById('menu-icon');
    links.classList.toggle('open');
    icon.textContent = links.classList.contains('open') ? '✕' : '☰';
}
document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('.nav-links').addEventListener('click', function(e) {
        if (e.target.tagName === 'A' && this.classList.contains('open')) {
            this.classList.remove('open');
            document.getElementById('menu-icon').textContent = '☰';
        }
    });
});
</script>
