<nav class="breadcrumb" aria-label="Breadcrumb">
    <ol itemscope itemtype="https://schema.org/BreadcrumbList">
        <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <a href="/" itemprop="item"><span itemprop="name">首页</span></a>
            <meta itemprop="position" content="1">
        </li>
        {{ if eq .Type "tools" }}
        <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <a href="/tools/" itemprop="item"><span itemprop="name">AI工具</span></a>
            <meta itemprop="position" content="2">
        </li>
        {{ end }}
        {{ if eq .Type "guides" }}
        <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <a href="/guides/" itemprop="item"><span itemprop="name">指南</span></a>
            <meta itemprop="position" content="2">
        </li>
        {{ end }}
        {{ if eq .Type "insights" }}
        <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <a href="/insights/" itemprop="item"><span itemprop="name">洞察</span></a>
            <meta itemprop="position" content="2">
        </li>
        {{ end }}
        <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <span itemprop="name">{{ .Title }}</span>
            <meta itemprop="position" content="3">
        </li>
    </ol>
</nav>

<style>
.breadcrumb {
    padding: 1rem 0;
    max-width: 1200px;
    margin: 0 auto;
}
.breadcrumb ol {
    display: flex;
    list-style: none;
    padding: 0;
    margin: 0;
    flex-wrap: wrap;
}
.breadcrumb li {
    display: flex;
    align-items: center;
}
.breadcrumb li:not(:last-child)::after {
    content: ">";
    margin: 0 0.5rem;
    color: var(--text-muted);
}
.breadcrumb a {
    color: var(--accent-primary-hover);
    text-decoration: none;
}
.breadcrumb a:hover {
    text-decoration: underline;
}
</style>
