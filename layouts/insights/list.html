{{ define "main" }}
<div class="page-container">
    <div class="page-header">
        <h1>{{ .Title }}</h1>
        <p class="page-desc">AI 开发深度分析、评测和最佳实践。</p>
    </div>
    {{ if .Pages }}
    <div class="guides-list">
        {{ range .Pages.ByDate.Reverse }}
        <article class="guide-card">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            <p>{{ .Description }}</p>
            <time>{{ .Date.Format "2006-01-02" }}</time>
        </article>
        {{ end }}
    </div>
    {{ else }}
    <div class="page-container" style="text-align: center; padding: 4rem 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">💡</div>
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem;">洞察即将上线</h2>
        <p style="color: var(--text-secondary);">我们正在准备 AI 开发的深度分析和最佳实践内容。</p>
        <a href="/tools/" class="btn btn-primary" style="margin-top: 1.5rem;">
            浏览工具
        </a>
    </div>
    {{ end }}
</div>
{{ end }}
