{{ define "main" }}
<div class="page-container" style="text-align: center; padding: 8rem 2rem;">
    <div style="font-size: 6rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem;">404</div>
    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 1rem;">Page Not Found</h1>
    <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.125rem;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-primary" style="display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; background: var(--accent-gradient); color: white; font-weight: 600; font-size: 0.875rem; border-radius: 6px; text-decoration: none;">
        <i data-lucide="home" style="width: 16px; height: 16px;"></i> Back to Home
    </a>
</div>
<style>
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }
</style>
{{ end }}
