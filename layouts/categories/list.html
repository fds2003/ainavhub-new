{{ define "main" }}
<div class="page-container">
    <div class="page-header">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}<p class="page-desc">{{ . }}</p>{{ end }}
    </div>
    
    <div class="categories-overview">
        {{ range .Pages.ByTitle }}
        <a href="{{ .RelPermalink }}" class="category-block">
            <div class="cat-icon-bg">{{ partial "category-icon" (dict "category" .Title "default" "📁") }}</div>
            <h3>{{ .Title }}</h3>
            <span class="cat-count">{{ len .Pages }} 工具</span>
        </a>
        {{ end }}
    </div>
</div>
{{ end }}
