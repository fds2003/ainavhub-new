<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    {{ partial "head.html" . }}
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    {{ partial "header.html" . }}
    <main id="main-content" style="min-height: calc(100vh - 60px);">
        {{- block "main" . }}{{- end }}
    </main>
    {{ partial "footer.html" . }}
</body>
</html>
