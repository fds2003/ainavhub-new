<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    {{ partial "head.html" . }}
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    
    <style>
    /* ===== CSS Variables ===== */
    :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a24;
        --bg-card: #16161f;
        --bg-card-hover: #1e1e2a;
        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --accent-primary: #6366f1;
        --accent-primary-hover: #818cf8;
        --accent-secondary: #22d3ee;
        --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
        --border-color: #27272a;
        --border-light: #3f3f46;
        --success: #22c55e;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
        --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
        --shadow-lg: 0 10px 25px rgba(0,0,0,0.5);
        --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 24px;
    }
    [data-theme="light"] {
        --bg-primary: #ffffff; --bg-secondary: #f9fafb; --bg-tertiary: #f3f4f6;
        --bg-card: #ffffff; --bg-card-hover: #f9fafb;
        --text-primary: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af;
        --border-color: #e5e7eb; --border-light: #d1d5db;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.06); --shadow-md: 0 4px 6px rgba(0,0,0,0.04);
        --shadow-lg: 0 10px 25px rgba(0,0,0,0.08); --shadow-glow: 0 0 40px rgba(99,102,241,0.1);
    }

    /* ===== Reset ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary); color: var(--text-primary);
        line-height: 1.6; min-height: 100vh; padding-top: 64px;
        -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    /* ===== Buttons ===== */
    .btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500;
        border-radius: var(--radius-sm); border: none; cursor: pointer;
        text-decoration: none; transition: all 150ms ease;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .btn-primary {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.75rem 1.5rem; background: var(--accent-gradient); color: white;
        font-weight: 600; font-size: 0.875rem; border-radius: var(--radius-sm);
        text-decoration: none; transition: all 150ms ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }

    /* ===== Page Layout ===== */
    .page-container { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
    .page-header { margin-bottom: 3rem; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.75rem; }
    .page-desc { color: var(--text-secondary); font-size: 1.125rem; }
    .page-meta { margin-top: 0.5rem; color: var(--text-muted); font-size: 0.875rem; }
    @media (max-width: 768px) { .page-container { padding: 2rem 1.5rem; } }

    /* ===== Card Grid ===== */
    .tools-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 1.25rem;
    }
    @media (max-width: 768px) { .tools-grid { grid-template-columns: 1fr; } }

    /* ===== Tool Card ===== */
    .tool-card {
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-lg); padding: 1.25rem;
        transition: all 250ms ease;
    }
    .tool-card:hover {
        background: var(--bg-card-hover); border-color: var(--border-light);
        transform: translateY(-2px); box-shadow: var(--shadow-lg);
    }
    .tool-card-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 0.875rem; }
    .tool-icon {
        width: 44px; height: 44px; background: var(--bg-tertiary);
        border-radius: var(--radius-md); display: flex; align-items: center;
        justify-content: center; font-size: 1.25rem; flex-shrink: 0;
    }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .tool-name a { color: var(--text-primary); transition: color 150ms ease; }
    .tool-name a:hover { color: var(--accent-primary-hover); }
    .tool-category { font-size: 0.75rem; color: var(--accent-secondary); font-weight: 500; }
    .tool-description {
        font-size: 0.875rem; color: var(--text-secondary);
        line-height: 1.5; margin-bottom: 1rem;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .tool-footer { display: flex; align-items: center; justify-content: space-between; }
    .tool-tags { display: flex; gap: 0.5rem; }
    .tool-tag {
        padding: 0.25rem 0.625rem; background: var(--bg-secondary);
        border-radius: var(--radius-sm); font-size: 0.6875rem; color: var(--text-muted);
    }
    .tool-actions { display: flex; gap: 0.75rem; align-items: center; }
    .tool-link {
        display: inline-flex; align-items: center; gap: 0.375rem;
        font-size: 0.8125rem; font-weight: 500; color: var(--accent-primary-hover);
    }
    .tool-link:hover { text-decoration: underline; }

    /* ===== Guides Card ===== */
    .guides-list { display: flex; flex-direction: column; gap: 1.25rem; }
    .guide-card {
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-md); padding: 1.5rem;
        transition: all 200ms ease;
    }
    .guide-card:hover { background: var(--bg-card-hover); border-color: var(--border-light); }
    .guide-card h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    .guide-card h2 a { color: var(--text-primary); }
    .guide-card h2 a:hover { color: var(--accent-primary-hover); }
    .guide-card p { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 0.75rem; }
    .guide-card time { color: var(--text-muted); font-size: 0.75rem; }

    /* ===== Categories ===== */
    .categories-overview {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.25rem;
    }
    .category-block {
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-lg); padding: 2rem 1.5rem;
        text-align: center; text-decoration: none; transition: all 250ms ease;
    }
    .category-block:hover {
        background: var(--bg-card-hover); border-color: var(--accent-primary);
        transform: translateY(-2px); box-shadow: var(--shadow-glow);
    }
    .cat-icon-bg { font-size: 2.5rem; margin-bottom: 1rem; }
    .category-block h3 { font-size: 1.125rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
    .cat-count { color: var(--text-muted); font-size: 0.875rem; }

    /* ===== Pagination ===== */
    .pagination {
        display: flex; justify-content: center; align-items: center;
        gap: 0.25rem; margin-top: 3rem; list-style: none; padding: 0;
    }
    .pagination .page-link {
        display: inline-flex; align-items: center; justify-content: center;
        min-width: 36px; height: 36px; padding: 0 0.5rem;
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-sm); color: var(--text-secondary);
        font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 150ms ease;
    }
    .pagination .page-link:hover {
        background: var(--bg-card-hover); border-color: var(--accent-primary); color: var(--text-primary);
    }
    .pagination .active .page-link { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }
    .pagination .disabled .page-link { opacity: 0.4; cursor: not-allowed; }

    /* ===== Breadcrumb ===== */
    .breadcrumb { padding: 1rem 0; max-width: 1400px; margin: 0 auto; }
    .breadcrumb ol { display: flex; list-style: none; padding: 0; margin: 0; flex-wrap: wrap; }
    .breadcrumb li { display: flex; align-items: center; }
    .breadcrumb li:not(:last-child)::after { content: ">"; margin: 0 0.5rem; color: var(--text-muted); }
    .breadcrumb a { color: var(--accent-primary-hover); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ===== Tool Detail ===== */
    .tool-detail-container {
        max-width: 1400px; margin: 0 auto; padding: 3rem 2rem;
        display: grid; grid-template-columns: 1fr 300px; gap: 3rem;
    }
    .tool-detail-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.5rem; }
    .tool-icon-lg {
        width: 64px; height: 64px; background: var(--bg-tertiary);
        border-radius: var(--radius-lg); display: flex; align-items: center;
        justify-content: center; font-size: 2rem; flex-shrink: 0;
    }
    .tool-detail-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .tool-badge {
        display: inline-block; padding: 0.25rem 0.75rem;
        background: rgba(99, 102, 241, 0.1); color: var(--accent-primary-hover);
        border-radius: 50px; font-size: 0.75rem; font-weight: 500;
    }
    .tool-detail-desc { font-size: 1.125rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.5rem; }
    .tool-meta { margin-bottom: 1.5rem; }
    .meta-item {
        display: inline-flex; align-items: center; gap: 0.5rem;
        color: var(--text-muted); font-size: 0.875rem; margin-right: 1.5rem;
    }
    .tool-actions-bar {
        display: flex; align-items: center; gap: 1rem;
        margin-bottom: 2rem; padding-bottom: 2rem;
        border-bottom: 1px solid var(--border-color);
    }
    .tool-content { color: var(--text-secondary); line-height: 1.8; }
    .tool-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; color: var(--text-primary); }
    .tool-content p { margin-bottom: 1rem; }
    .tool-content a { color: var(--accent-primary-hover); text-decoration: underline; }
    .tool-content code {
        padding: 0.125rem 0.375rem; background: var(--bg-tertiary);
        border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.875em;
    }
    .tool-content pre {
        background: var(--bg-tertiary); padding: 1rem; border-radius: var(--radius-md);
        overflow-x: auto; margin-bottom: 1rem;
    }
    .tool-content ul, .tool-content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .tool-content li { margin-bottom: 0.5rem; }

    /* ===== Sidebar ===== */
    .tool-sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar-card {
        background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-lg); padding: 1.25rem;
    }
    .sidebar-card h3 {
        font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem;
        text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
    }
    .sidebar-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .sidebar-item { display: flex; justify-content: space-between; }
    .sidebar-label { font-size: 0.8125rem; color: var(--text-muted); }
    .sidebar-value { font-size: 0.8125rem; color: var(--text-primary); font-weight: 500; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .sidebar-tag {
        padding: 0.25rem 0.625rem; background: var(--bg-secondary);
        border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--text-muted);
    }
    .related-list { list-style: none; }
    .related-list li { margin-bottom: 0.5rem; }
    .related-list a { color: var(--text-secondary); font-size: 0.875rem; transition: color 150ms ease; }
    .related-list a:hover { color: var(--accent-primary-hover); }
    .share-links { display: flex; gap: 0.75rem; }
    .share-links a, .share-links button {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; background: var(--bg-secondary);
        border: 1px solid var(--border-color); border-radius: var(--radius-sm);
        color: var(--text-muted); cursor: pointer; transition: all 150ms ease;
    }
    .share-links a:hover, .share-links button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    @media (max-width: 768px) { .tool-detail-container { grid-template-columns: 1fr; padding: 2rem 1.5rem; } }

    /* ===== Search ===== */
    .search-result-item {
        display: block; background: var(--bg-card); border: 1px solid var(--border-color);
        border-radius: var(--radius-md); padding: 1rem 1.25rem;
        margin-bottom: 0.75rem; text-decoration: none;
        animation: fadeIn 0.3s ease forwards; opacity: 0; transition: all 200ms ease;
    }
    .search-result-item:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }
    .search-result-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.25rem; }
    .search-result-header h3 { font-size: 1rem; font-weight: 600; color: var(--text-primary); }
    .search-result-item p { font-size: 0.875rem; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .search-type-badge {
        font-size: 0.6875rem; font-weight: 600; padding: 0.15rem 0.5rem;
        border-radius: 4px; white-space: nowrap; flex-shrink: 0;
    }
    .search-type-tool { background: rgba(99, 102, 241, 0.15); color: var(--accent-primary-hover); }
    .search-type-guide { background: rgba(34, 211, 238, 0.15); color: var(--accent-secondary); }

    /* ===== Animations ===== */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>
    {{ partial "header.html" . }}
    <main id="main-content" style="min-height: calc(100vh - 64px);">
        {{- block "main" . }}{{- end }}
    </main>
    {{ partial "footer.html" . }}
    <script>if(window.lucide) lucide.createIcons();</script>
</body>
</html>
