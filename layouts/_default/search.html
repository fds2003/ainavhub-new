{{ define "main" }}
<div class="page-container" style="text-align: center; padding: 6rem 2rem;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 1rem;">搜索AI工具</h1>
    <div style="max-width: 600px; margin: 0 auto 3rem;">
        <div style="position: relative;">
            🔍
            <input type="search" id="search-input" placeholder="搜索 AI工具、指南、OpenClaw教程..." 
                style="width: 100%; padding: 1rem 1.25rem 1rem 3.25rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); font-size: 1rem; color: var(--text-primary); outline: none; box-sizing: border-box;">
        </div>
    </div>
    <div id="search-results" style="max-width: 800px; margin: 0 auto; text-align: left;"></div>
</div>

<script>
const searchInput = document.getElementById('search-input');
const resultsDiv = document.getElementById('search-results');
let allItems = [];

fetch('/tools/index.xml').then(r => r.text()).then(xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    doc.querySelectorAll('item').forEach(item => {
        allItems.push({type: 'tool', title: item.querySelector('title')?.textContent || '', desc: item.querySelector('description')?.textContent || '', link: item.querySelector('link')?.textContent || ''});
    });
});
fetch('/guides/index.xml').then(r => r.text()).then(xml => {
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    doc.querySelectorAll('item').forEach(item => {
        allItems.push({type: 'guide', title: item.querySelector('title')?.textContent || '', desc: item.querySelector('description')?.textContent || '', link: item.querySelector('link')?.textContent || ''});
    });
});

searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { resultsDiv.innerHTML = ''; return; }
    const results = allItems.filter(t => t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)).slice(0, 20);
    if (results.length === 0) {
        resultsDiv.innerHTML = '<p style="color: var(--text-muted); text-align: center;">未找到结果</p>';
        return;
    }
    resultsDiv.innerHTML = results.map((item, i) => `
        <a href="${item.link}" class="search-result-item" style="animation-delay: ${i * 30}ms">
            <div class="search-result-header">
                <span class="search-type-badge search-type-${item.type}">${item.type === 'tool' ? '🔧 工具' : '📖 指南'}</span>
                <h3>${item.title}</h3>
            </div>
            <p>${item.desc}</p>
        </a>
    `).join('');
});
</script>
{{ end }}
