{{ define "main" }}
{{ partial "breadcrumb.html" . }}
<div class="page-container" style="max-width: 900px;">
    <article class="openclaw-article">
        <h1>{{ .Title }}</h1>
        <div class="openclaw-content">
            {{ .Content }}
        </div>
    </article>
</div>

<style>
.openclaw-content { color: var(--text-secondary); line-height: 1.9; font-size: 16px; }
.openclaw-content h1 { font-size: 28px; font-weight: 700; margin: 32px 0 16px; color: var(--text-primary); }
.openclaw-content h2 { font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: var(--text-primary); padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
.openclaw-content h3 { font-size: 18px; font-weight: 600; margin: 24px 0 10px; color: var(--text-primary); }
.openclaw-content h4 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; color: var(--text-primary); }
.openclaw-content p { margin-bottom: 16px; }
.openclaw-content a { color: var(--accent-primary); }
.openclaw-content a:hover { text-decoration: underline; }
.openclaw-content ul, .openclaw-content ol { padding-left: 24px; margin-bottom: 16px; }
.openclaw-content li { margin-bottom: 6px; }
.openclaw-content blockquote {
    border-left: 4px solid var(--accent-primary); padding: 12px 16px;
    margin: 16px 0; background: var(--bg-secondary); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-secondary); font-size: 15px;
}
.openclaw-content blockquote p:last-child { margin-bottom: 0; }
.openclaw-content code {
    padding: 2px 6px; background: var(--bg-tertiary); border-radius: 3px;
    font-size: 14px; font-family: 'JetBrains Mono', monospace;
}
.openclaw-content pre {
    background: var(--bg-tertiary); padding: 16px; border-radius: var(--radius-md);
    overflow-x: auto; margin-bottom: 16px; border: 1px solid var(--border-color);
}
.openclaw-content pre code { background: none; padding: 0; }
.openclaw-content img { max-width: 100%; border-radius: var(--radius-md); margin: 16px 0; }
.openclaw-content table { width: 100%; border-collapse: collapse; margin: 16px 0; }
.openclaw-content th, .openclaw-content td { padding: 10px 12px; border: 1px solid var(--border-color); text-align: left; font-size: 14px; }
.openclaw-content th { background: var(--bg-secondary); font-weight: 600; color: var(--text-primary); }
.openclaw-content hr { border: none; border-top: 1px solid var(--border-color); margin: 32px 0; }
</style>
{{ end }}
