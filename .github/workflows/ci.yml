name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run source tests
        run: node test.mjs

      - name: Build site and sitemaps
        run: npm run build

      - name: Check output
        run: |
          echo "Build output:"
          du -sh public/
          echo "HTML files: $(find public/ -name '*.html' | wc -l)"
          echo "Sitemaps:"
          ls -lh public/sitemap*.xml
          for f in public/sitemap*.xml; do
            count=$(grep -c '<loc>' "$f" || true)
            echo "  $f → $count URLs"
          done
