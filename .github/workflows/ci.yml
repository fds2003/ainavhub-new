name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.145.0"
          extended: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run source tests
        run: node test.mjs

      - name: Hugo build
        run: hugo --gc

      - name: Check output size
        run: |
          echo "Build output:"
          du -sh public/
          echo "HTML files: $(find public/ -name '*.html' | wc -l)"
          echo "JSON index files: $(find public/ -name 'index.json' | wc -l)"
