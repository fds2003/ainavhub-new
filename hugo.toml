baseURL = "https://ainavhub.top/"
locale = "zh-CN"
title = "AINavHub - AI工具导航"
theme = "PaperMod"
timeout = "120s"

# Use static/robots.txt
enableRobotsTXT = false
enableGitInfo = false
enableEmoji = true
hasCJKLanguage = true
paginate = 50

# Allow raw HTML in markdown content (from converted tutorials)
[markup.goldmark.renderer]
  unsafe = true

# Permalinks
[permalinks]
  tools = "/tools/:slug/"
  guides = "/guides/:slug/"
  insights = "/insights/:slug/"

# Navigation
[[menu.main]]
  identifier = "tools"
  name = "AI工具"
  url = "/tools/"
  weight = 1

[[menu.main]]
  identifier = "guides"
  name = "指南"
  url = "/guides/"
  weight = 2

[[menu.main]]
  identifier = "insights"
  name = "洞察"
  url = "/insights/"
  weight = 3

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 4

# Social Links
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/ainavhub"

# SEO Parameters
[params]
  description = "发现最好的AI开发工具，涵盖AI编程、Agent、MCP服务器和工作流自动化"
  keywords = ["AI工具", "AI编程", "AI工作流", "MCP服务器", "AI Agent", "LLM"]
  author = "AINavHub"
  
[params.schema]
  toolTemplate = "tools/single.html"
  guideTemplate = "guides/single.html"
  insightTemplate = "insights/single.html"

# Sitemap
[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.8

# Related content
[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "titles"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "categories"
    weight = 60
